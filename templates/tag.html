<div class="flex flex-row gap-8">
  <div class="flex-1 min-w-0">
    <h1 class="!mb-2 !mt-8 !leading-tight">#{{.CurrentTag}}</h1>
    <ul class="list-none !pl-0 !my-0 space-y-1">
      {{range .TaggedPages}}
        <li class="!m-0 !p-0">
          <a href="/{{.PublicPath}}">{{.Title}}</a>
          <small class="text-slate-400"><time datetime="{{.PublishedAt.Format "2006-01-02"}}">{{.PublishedAt.Format "2006/01/02"}}</time></small>
        </li>
      {{end}}
    </ul>
  </div>
  {{template "tags" .Tags}}
</div>
